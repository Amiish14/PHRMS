{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto">
  <div class="card">
    <div class="card-header"><div class="card-title">Update Your Password</div></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group">
            <label class="form-label">Current Password <span class="req">*</span></label>
            <input type="password" class="form-input" name="current_password" required>
          </div>
          <div class="form-group">
            <label class="form-label">New Password <span class="req">*</span></label>
            <input type="password" class="form-input" name="new_password" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password <span class="req">*</span></label>
            <input type="password" class="form-input" name="confirm_password" required minlength="8">
          </div>
        </div>
        <div style="margin-top:20px;display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">Update Password</button>
          <a href="{{ url_for('auth.index') }}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
