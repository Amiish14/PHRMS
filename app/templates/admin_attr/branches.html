{% extends "base.html" %}
{% block title %}Branches{% endblock %}
{% block page_title %}Branches{% endblock %}
{% block content %}
<div class="card">
  <table class="dt"><thead><tr><th>ID</th><th>Branch Name</th><th>Status</th></tr></thead>
  <tbody>{% for r in rows %}
    <tr><td class="mono" style="font-size:11px;color:var(--g400)">{{ r.branchid }}</td>
      <td style="font-weight:500">{{ r.branchesname }}</td>
      <td><span class="badge bg-green">Active</span></td>
    </tr>
  {% else %}<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--g400)">No branches</td></tr>{% endfor %}
  </tbody></table>
</div>{% endblock %}
