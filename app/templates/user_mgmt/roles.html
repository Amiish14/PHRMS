{% extends "base.html" %}
{% block title %}Roles{% endblock %}
{% block page_title %}Roles{% endblock %}
{% block content %}
<div class="card">
  <table class="dt"><thead><tr><th>Role ID</th><th>Role Name</th><th>Status</th></tr></thead>
  <tbody>{% for r in rows %}
    <tr><td class="mono" style="color:var(--g400);font-size:11px">{{ r.roleid }}</td>
      <td style="font-weight:500">{{ r.rolename }}</td>
      <td><span class="badge bg-green">Active</span></td>
    </tr>
  {% else %}<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--g400)">No roles</td></tr>{% endfor %}
  </tbody></table>
</div>{% endblock %}
